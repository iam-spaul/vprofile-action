name: vprofile CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  REGISTRY: subhankarpaul
  IMAGE_NAME: vprofile

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Maven Build
      run: mvn clean install -Dcheckstyle.skip=true

    - name: Generate Checkstyle Report
      run: mvn checkstyle:checkstyle

    - name: Upload Checkstyle Report
      uses: actions/upload-artifact@v4
      with:
        name: checkstyle-report
        path: target/checkstyle-result.xml

    - name: SonarCloud Scan
      run: |
        mvn -B clean verify sonar:sonar \
          -Dsonar.projectKey=iam-spaul_vprofile-action \
          -Dsonar.organization=vprofile-action-2026 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: subhankarpaul
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: subhankarpaul/vprofileapp:${{ github.run_number }}